<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>To-Do-List</h1>
    <div class="form">
        <div class="tambah-tugas">
            <input type="text" class="input-tugas" id="input-tugas" placeholder="Masukkan tugas baru">
            <button id="btn-tambah">Tambah</button>
        </div>
        <div class="list-tugas">
            <h3 class="dtugas">Daftar Tugas</h3>
            <div class="list">
                <ul id="daftar-list">
                    <!-- <li>contoh tugas<button class="btn-hapus">X</button></li> -->
                </ul>
            </div>
        </div>

    </div>
    <script src="main.js"></script>
</body>
</html>
