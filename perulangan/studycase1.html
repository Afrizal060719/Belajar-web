<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar for js</title>
</head>
<body>
    <h1>perulangan Js</h1>
    <p id="demo"></p>

    <script>
        let products = [
            { nama: "Laptop", harga: 7000 },
            { nama: "Mouse", harga: 200 },
            { nama: "Keyboard", harga: 500 },
            { nama: "Monitor", harga: 3000 }
        ];

        let text = "";
        for (let i = 0; i < products.length; i++) {
            if (products[i].harga > 1000)
            text += (i + 1) + ". " + products[i].nama + " Rp" + products[i].harga + "<br>";
        }

        document.getElementById('demo').innerHTML = text;
    </script>
</body>
</html>
