<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan JS</title>
</head>
<body>
    <h1>Perulangan js</h1>
    <p id="demo"></p>

    <script>
        const cars = ["BMW", "Volvo", "Saab", "Ford", "Fiat", "Audi"];

        let text = "";
        for (let i = 0; i < cars.length; ++i) {
            text += cars[i] + "<br>"; // cars[i] -> ambil isi array cars berdasarkan posisi (index) ke-i
        }

        document.getElementById('demo').innerHTML = text;
    </script>
</body>
</html>
