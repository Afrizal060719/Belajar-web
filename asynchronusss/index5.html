<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>belajar asynchronus</title>
  </head>
  <body>
    <h1>Belajar asynchronus</h1>

    <script>
      function hitung(a, b, operasi) {
        return operasi(a, b);
      }

      function tambah(x, y) {
        return x + y;
      }

      function kali(x, y) {
        return x * y;
      }

      console.log("Hasil tambah:", hitung(5, 3, tambah));
      console.log("Hasil kali:", hitung(5, 3, kali));
    </script>
  </body>
</html>
