<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar asynchronus callback</title>
</head>
<body>
    <h1>belajar callback asynchronus</h1>

    <script>
        function halo(nama) {
            console.log("nama" + " " + nama);
        }

        function panggil(callback) {
            callback("dani");
        }
        
        panggil(halo);
    </script>
</body>
</html>
