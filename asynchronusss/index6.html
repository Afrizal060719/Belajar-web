<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajar asynchronus</title>
  </head>
  <body>
    <h1>promise</h1>

    <script>
      let janji = new Promise(function (resolve, reject) {
        let sukses = true;

        if (sukses) {
          resolve("Janji terpenuhi!");
        } else {
          reject("Janji gagal!");
        }
      });

      janji
        .then(function (hasil) {
          console.log(hasil);
        })
        .catch(function (error) {
          console.log(error);
        });
    </script>
  </body>
</html>
