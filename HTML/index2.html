<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar HTML 2</title>
</head>
<body>
    <h1>Belajar tautan dan gambar</h1>

    <p>berikut adalah artikel tentang HTML</p>
    <!-- elemen a di html di gunakan untuk membuat tautan dengan menggunakan atribut href-->
    <a href="https://if.unpas.ac.id/berita/apa-itu-html-pengertian-sejarah-dan-bagaimana-cara-kerjanya/">klik ini</a>

    <br>

    <!-- elemen img di html di gunakan untuk menampilkan gambar -->
    <img src="https://plus.unsplash.com/premium_photo-1718035557075-5111d9d906d2?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Monumen Paris" width="400" height="200">
    <!-- atribut alt digunakan untuk memberikan deskripsi gambar -->
    <!-- atribut src digunakan untuk memberikan link gambar -->
    <!-- atribut width dan height digunakan untuk memberikan ukuran gambar -->

</body>
</html>
