<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>percobaan if else w3schools</h1>
    <p id="demo"></p>

    <script>
        let teks = document.getElementById("demo");

        if (Math.random() < 0.5) {
            teks.innerHTML = '<a href="https://www.w3schools.com">web w3chools</a>';
        } else {
            teks.innerHTML = '<a href="https://wwf.org">web wwf</a>';
        }
    </script>
</body>
</html>
