<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan JS 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
        <h1>Penggabungan Nama</h1>
        <div class="inputgroup">
            <div class="input">
                <input type="text" id="nama-d" class="nama-d" placeholder="Masukan Nama Depan">

            <div class="input">
                <input type="text" id="nama-b" class="nama-b" placeholder="Masukan Nama Belakang">

        <div class="btn">
            <button id="btn" class="tombol">Gabung</button>
        </div>
    </div>
    <span id="hasil" class="hasil">Hasil</span>

    <script src="main.js"></script>
</body>
</html>
