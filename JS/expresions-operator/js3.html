<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>expresion & operator</title>
</head>
<body>
    <h1>operator != & !==</h1>

    <script>
        // operator != membandingkan nilai dari 2 operan, jika nilai keduanya tidak sama makan akan true
        // jika sama akan false dan operator != ini mengkonversi tipe data jika kedua operan memiliki tipe data yang berbeda maka akan dikonversi ke tipe data yang sama sebelum dibandingkan
        let a = 5;
        let b = "3";
        console.log(a != b);

        // operator !== membandingkan nilai dan tipe data dari 2 operan jika nilai dan tipe data 2 operan
        // berbeda maka akan true jika sama maka akan false dan operator !== ini tidak mengkonversi tipe data jika kedua operan memiliki tipe data yang berbeda
        let x = 78;
        let y = "78";
        console.log(x !== y);
    </script>
</body>
</html>
