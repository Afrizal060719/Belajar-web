<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>expresion & operator</title>
</head>
<body>
    <h1>Operator Penugasan Penjumlahan (+=)</h1>
    <p>Operator penugasan penjumlahan (+=) digunakan untuk menambahkan nilai suatu variabel dengan nilai tertentu dan menyimpan hasilnya kembali ke variabel tersebut.</p>

    <script>
        // penjumlahan angka
        let a = 10;
        a += 4; // ini artinya varibel a ditambah dengan 4, / a = a - 4
        console.log(a);

        // penjumlahan string
        let t = "hello";
        t += " world"; // ini artinya varibel t ditambah dengan string " world", / t = t + " world"
        console.log(t);

        // penjumlahan BigInt
        let b = 10n;
        b += 9n; // ini artinya varibel b ditambah dengan 9n, / b = b + 9n
        console.log(b);
    </script>
</body>
</html>
