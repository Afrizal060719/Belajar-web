<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kalkulator Bonus Karyawan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h2>Cek Bonus Karyawan</h2>

      <label>Gaji Pokok</label>
      <input type="number" id="salary" placeholder="Contoh: 5000000" />

      <label>Lama Kerja (tahun)</label>
      <input type="number" id="years" placeholder="Contoh: 4" />

      <label>Status Kehadiran</label>
      <select id="attendance">
        <option value="">-- pilih --</option>
        <option value="hadir">Hadir</option>
        <option value="tidak">Tidak</option>
      </select>

      <button id="checkBtn">Cek Bonus</button>

      <p id="result"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
