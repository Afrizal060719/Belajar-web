<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Dashboard</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      :root {
        --primary: #6366f1;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #1e293b;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .container {
        width: 100%;
        max-width: 500px;
        background: var(--card);
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }

      header {
        text-align: center;
        margin-bottom: 25px;
      }

      .stats-container {
        display: flex;
        justify-content: space-around;
        margin: 20px 0;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
      }

      #progress-fill {
        height: 100%;
        width: 0%;
        background: var(--primary);
        transition: width 0.3s ease;
      }

      .input-section {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      input,
      select,
      button {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
      }

      input {
        flex: 2;
      }

      #add-btn {
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      .filter-section {
        display: flex;
        gap: 5px;
        margin-bottom: 20px;
      }

      .filter-btn {
        flex: 1;
        font-size: 0.8rem;
        cursor: pointer;
        background: #f1f5f9;
      }

      .filter-btn.active {
        background: var(--primary);
        color: white;
      }

      #task-list {
        list-style: none;
        padding: 0;
      }

      .task-item {
        display: flex;
        align-items: center;
        padding: 12px;
        border-bottom: 1px solid #f1f5f9;
        gap: 10px;
      }

      .task-item.completed span {
        text-decoration: line-through;
        color: #94a3b8;
      }

      .category-tag {
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 12px;
        background: #e0e7ff;
        color: var(--primary);
      }

      .delete-btn {
        margin-left: auto;
        color: #ef4444;
        cursor: pointer;
        border: none;
        background: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>My Daily Tasks</h1>
        <div class="stats-container">
          <div class="stat-item">
            <span id="total-tasks">0</span>
            <p>Total</p>
          </div>
          <div class="stat-item">
            <span id="completed-tasks">0</span>
            <p>Selesai</p>
          </div>
        </div>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </header>

      <section class="input-section">
        <input
          type="text"
          id="task-input"
          placeholder="Apa yang ingin dikerjakan?"
        />
        <select id="category-select">
          <option value="Work">Pekerjaan</option>
          <option value="Personal">Pribadi</option>
          <option value="Urgent">Penting</option>
        </select>
        <button id="add-btn">Tambah</button>
      </section>

      <section class="filter-section">
        <button class="filter-btn active" data-filter="all">Semua</button>
        <button class="filter-btn" data-filter="Work">Pekerjaan</button>
        <button class="filter-btn" data-filter="Personal">Pribadi</button>
        <button class="filter-btn" data-filter="Urgent">Penting</button>
      </section>

      <ul id="task-list"></ul>
    </div>

    <script>
      const input = document.getElementById("task-input");
      const kategori = document.getElementById("category-select");
      const tombol = document.getElementById("add-btn");

      tombol.addEventListener('click', function () {
        const form = input.value;
        const categori = kategori.value;
        console.log(`ini adalah keberhasilan: ${form}`);

        
      });
    </script>
  </body>
</html>
